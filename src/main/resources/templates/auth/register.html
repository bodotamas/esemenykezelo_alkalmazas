<!DOCTYPE html>
<html lang="hu" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Regisztráció</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="auth-wrap">
    <div class="auth-card">
        <div class="row g-3">
            <div class="col-lg-5">
                <div class="auth-side p-4 p-lg-5 h-100">
                    <span class="badge-soft">Regisztráció</span>
                    <h2 class="mt-3 mb-2">Hozz létre fiókot</h2>
                    <p class="text-muted mb-4">
                        Válaszd ki a szerepköröd, töltsd ki az adatokat, és már használhatod is a rendszert.
                    </p>
                    <div class="d-flex flex-wrap gap-2">
                        <span class="badge-soft">LAKOS</span>
                        <span class="badge-soft">SZERVEZO</span>
                    </div>
                </div>
            </div>

            <div class="col-lg-7">
                <div class="app-card p-4 p-lg-5">
                    <h1 class="h3 fw-bold mb-1">Fiók létrehozása</h1>
                    <p class="text-muted mb-4">Az * jelölt mezők kitöltése ajánlott a gyors induláshoz.</p>

                    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

                    <form th:action="@{/register}" method="post" th:object="${form}">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label">Felhasználónév *</label>
                                <input class="form-control" type="text" th:field="*{username}" required>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label">Email</label>
                                <input class="form-control" type="email" th:field="*{email}">
                            </div>

                            <div class="col-md-6">
                                <label class="form-label">Jelszó *</label>
                                <input class="form-control" type="password" th:field="*{password}" required>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label">Jelszó újra *</label>
                                <input class="form-control" type="password" th:field="*{confirmPassword}" required>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label">Szerepkör</label>
                                <select class="form-select" th:field="*{role}">
                                    <option value="LAKOS">LAKOS</option>
                                    <option value="SZERVEZO">SZERVEZO</option>
                                </select>
                                <div class="form-text">
                                    Admin szerepkör nem választható, azt csak a rendszer adhat.
                                </div>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label">Születési dátum</label>
                                <input class="form-control" type="date" th:field="*{birthDate}">
                            </div>

                            <div class="col-md-6">
                                <label class="form-label">Vezetéknév</label>
                                <input class="form-control" type="text" th:field="*{lastName}">
                            </div>

                            <div class="col-md-6">
                                <label class="form-label">Keresztnév</label>
                                <input class="form-control" type="text" th:field="*{firstName}">
                            </div>

                            <div class="col-md-6">
                                <label class="form-label">Hobbi</label>
                                <input class="form-control" type="text" th:field="*{hobby}">
                            </div>
                        </div>

                        <div class="mt-4 d-flex flex-wrap gap-2">
                            <button class="btn btn-primary" type="submit">Fiók létrehozása</button>
                            <a class="btn btn-outline-light" th:href="@{/login}">Vissza a belépéshez</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
