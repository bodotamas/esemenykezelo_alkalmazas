<!doctype html>
<html lang="hu" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <title>Jelszó helyreállítás</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="container" style="max-width:520px; margin:40px auto;">
    <h2>Jelszó helyreállítás</h2>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <form th:action="@{/forgot-password}" method="post" th:object="${form}">
        <div style="margin-top:12px;">
            <label for="email">E-mail cím</label>
            <input id="email" type="email" th:field="*{email}" required class="form-control"/>
        </div>

        <button type="submit" style="margin-top:16px;" class="btn btn-primary">
            Link küldése
        </button>
    </form>

    <div style="margin-top:16px;">
        <a th:href="@{/login}">Vissza a bejelentkezéshez</a>
    </div>
</div>
</body>
</html>
