<!doctype html>
<html lang="hu" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <title>Új jelszó</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="container" style="max-width:520px; margin:40px auto;">
    <h2>Új jelszó beállítása</h2>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <form th:action="@{/reset-password}" method="post" th:object="${form}">
        <input type="hidden" th:field="*{token}"/>

        <div style="margin-top:12px;">
            <label for="password">Új jelszó</label>
            <input id="password" type="password" th:field="*{password}" required class="form-control"/>
        </div>

        <div style="margin-top:12px;">
            <label for="confirmPassword">Új jelszó újra</label>
            <input id="confirmPassword" type="password" th:field="*{confirmPassword}" required class="form-control"/>
        </div>

        <button type="submit" style="margin-top:16px;" class="btn btn-primary">
            Jelszó mentése
        </button>
    </form>
</div>
</body>
</html>
