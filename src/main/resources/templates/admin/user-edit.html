<!DOCTYPE html>
<html lang="hu" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin – Felhasználó szerkesztése</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="page-wrap">
    <div class="container" style="max-width: 960px;">

        <div class="d-flex align-items-start justify-content-between flex-wrap gap-2 mb-3">
            <div>
                <h1 class="h3 mb-1">Felhasználó szerkesztése</h1>
                <div class="text-muted">Adminisztrátori jogosultság</div>
            </div>
            <a class="btn btn-outline-light" th:href="@{/admin/users}">Vissza</a>
        </div>

        <div class="app-card p-3 p-lg-4">

            <div class="d-flex flex-wrap align-items-center gap-3 mb-4">
                <img th:src="${user.profileImagePath != null ? user.profileImagePath : '/images/default-avatar.png'}"
                     alt="Profilkép"
                     class="rounded-circle"
                     style="width: 72px; height: 72px; object-fit: cover; border: 1px solid rgba(255,255,255,.18);">

                <div>
                    <div class="fw-bold" th:text="${user.username}">username</div>
                    <div class="text-muted small">
                        ID: <span th:text="${user.id}">1</span>
                    </div>
                </div>
            </div>

            <form th:action="@{|/admin/users/${user.id}/edit|}"
                  method="post"
                  th:object="${user}">
                <input type="hidden"
                       th:name="${_csrf.parameterName}"
                       th:value="${_csrf.token}">

                <div class="row g-3">

                    <div class="col-md-6">
                        <label class="form-label">Email</label>
                        <input class="form-control" type="email" th:field="*{email}">
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Születési dátum</label>
                        <input class="form-control" type="date" th:field="*{birthDate}">
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Vezetéknév</label>
                        <input class="form-control" type="text" th:field="*{lastName}">
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Keresztnév</label>
                        <input class="form-control" type="text" th:field="*{firstName}">
                    </div>

                    <div class="col-12">
                        <label class="form-label">Hobbi</label>
                        <input class="form-control" type="text" th:field="*{hobby}">
                    </div>

                    <!-- Roles -->
                    <div class="col-12">
                        <div class="app-panel p-3">
                            <label class="form-label mb-2">Role-ok</label>

                            <div class="d-flex flex-wrap gap-3">
                                <div class="form-check" th:each="r : ${allRoles}">
                                    <input class="form-check-input"
                                           type="checkbox"
                                           name="roles"
                                           th:value="${r}"
                                           th:checked="${user.roles.contains(r)}"
                                           th:id="${'role_' + r}">
                                    <label class="form-check-label"
                                           th:for="${'role_' + r}"
                                           th:text="${r}">
                                        ROLE
                                    </label>
                                </div>
                            </div>

                            <div class="form-text mt-2">
                                Legalább 1 role ajánlott (ha üresen hagyod, nem írjuk felül).
                            </div>
                        </div>
                    </div>

                </div>

                <div class="mt-4 d-flex flex-wrap gap-2">
                    <button class="btn btn-primary" type="submit">Mentés</button>
                    <a class="btn btn-outline-light" th:href="@{/admin/users}">Mégse</a>
                </div>
            </form>

        </div>

    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
