<!DOCTYPE html>
<html lang="hu"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="https://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin – Felhasználók</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="page-wrap">
    <div class="container" style="max-width: 1200px;">

        <div class="d-flex align-items-start justify-content-between flex-wrap gap-2 mb-3">
            <div>
                <h1 class="h3 mb-1">Felhasználók</h1>
                <div class="text-muted">Adminisztráció – felhasználók kezelése</div>
            </div>
            <a class="btn btn-outline-light" th:href="@{/events}">Események</a>
        </div>

        <div class="alert alert-success" th:if="${param.deleted}">
            Felhasználó törölve.
        </div>

        <div class="alert alert-danger" th:if="${param.selfDeleteError}">
            Saját magadat nem törölheted.
        </div>

        <div class="app-card p-3 p-lg-4" th:if="${users != null and !#lists.isEmpty(users)}">

            <div class="table-responsive">
                <table class="table table-dark table-hover align-middle mb-0 admin-table">
                    <thead>
                    <tr>
                        <th style="width: 80px;">ID</th>
                        <th>Felhasználónév</th>
                        <th>Email</th>
                        <th>Role-ok</th>
                        <th class="text-end" style="width: 210px;">Műveletek</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="u : ${users}">
                        <td class="text-muted" th:text="${u.id}">1</td>
                        <td class="fw-semibold" th:text="${u.username}">user</td>
                        <td th:text="${u.email}">email</td>
                        <td>
                            <span th:each="r : ${u.roles}"
                                  class="badge-soft me-1"
                                  th:text="${r}">ROLE</span>
                        </td>
                        <td class="text-end">
                            <div class="d-inline-flex gap-2">
                                <a class="btn btn-sm btn-outline-light"
                                   th:href="@{|/admin/users/${u.id}/edit|}">
                                    Szerkesztés
                                </a>

                                <form th:action="@{|/admin/users/${u.id}/delete|}"
                                      method="post"
                                      class="d-inline m-0"
                                      onsubmit="return confirm('Biztosan törlöd a felhasználót?');">
                                    <input type="hidden"
                                           th:name="${_csrf.parameterName}"
                                           th:value="${_csrf.token}">
                                    <button class="btn btn-sm btn-outline-danger" type="submit">
                                        Törlés
                                    </button>
                                </form>
                            </div>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

        </div>

        <div class="alert alert-info mt-3" th:if="${users == null or #lists.isEmpty(users)}">
            Nincs megjeleníthető felhasználó.
        </div>

    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
