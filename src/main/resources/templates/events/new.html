<!doctype html>
<html lang="hu" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Új esemény</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="page-wrap">
    <div class="container" style="max-width: 860px;">

        <div class="d-flex align-items-start justify-content-between flex-wrap gap-2 mb-3">
            <div>
                <h1 class="h3 mb-1">Esemény létrehozása</h1>
                <div class="text-muted">Add meg az alapadatokat, időpontot és opcionálisan képet.</div>
            </div>
            <a class="btn btn-outline-light" th:href="@{/events}">Vissza</a>
        </div>

        <form th:action="@{/events}" th:object="${event}" method="post"
              class="app-card p-3 p-lg-4"
              enctype="multipart/form-data">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

            <div class="row g-3">

                <div class="col-md-6">
                    <label class="form-label">Cím</label>
                    <input type="text" class="form-control" th:field="*{title}" required>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Helyszín</label>
                    <input type="text" class="form-control" th:field="*{location}" required>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Kategória</label>
                    <select class="form-select" th:field="*{category}">
                        <option th:each="c : ${allCategories}" th:value="${c}" th:text="${c}"></option>
                    </select>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Esemény képe</label>
                    <input class="form-control" type="file" name="image" accept="image/*">
                    <div class="form-text">JPG/PNG ajánlott.</div>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Dátum</label>
                    <input type="date"
                           class="form-control"
                           th:field="*{date}"
                           th:attr="min=${#dates.format(#dates.createNow(), 'yyyy-MM-dd')}">
                    <div class="text-danger mt-1" th:if="${#fields.hasErrors('date')}" th:errors="*{date}"></div>
                </div>

                <div class="col-md-3">
                    <label class="form-label">Kezdés</label>
                    <input type="time"
                           class="form-control"
                           name="startTimeStr"
                           th:value="${startTimeStr != null ? startTimeStr : '09:00'}"
                           required>
                </div>

                <div class="col-md-3">
                    <label class="form-label">Vége</label>
                    <input type="time"
                           class="form-control"
                           name="endTimeStr"
                           th:value="${endTimeStr != null ? endTimeStr : '10:00'}"
                           required>
                </div>

                <div class="col-12" th:if="${timeError}">
                    <div class="alert alert-danger mb-0" th:text="${timeError}"></div>
                </div>

                <div class="col-12">
                    <label class="form-label">Leírás</label>
                    <textarea class="form-control" th:field="*{description}" rows="5"
                              placeholder="Röviden írd le, miről szól az esemény..."></textarea>
                </div>

            </div>

            <div class="mt-4 d-flex flex-wrap gap-2">
                <button type="submit" class="btn btn-primary">Mentés</button>
                <a class="btn btn-outline-light" th:href="@{/events}">Mégse</a>
            </div>
        </form>

    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
