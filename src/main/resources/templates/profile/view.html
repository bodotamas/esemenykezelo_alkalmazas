<!DOCTYPE html>
<html lang="hu" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Profil</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="page-wrap">
    <div class="container" style="max-width: 920px;">

        <div class="d-flex align-items-start justify-content-between flex-wrap gap-2 mb-3">
            <div>
                <h1 class="h3 mb-1">Profil</h1>
                <div class="text-muted">A fiókod alapadatai és gyors műveletek.</div>
            </div>
            <a class="btn btn-outline-light" th:href="@{/events}">Események</a>
        </div>

        <div class="app-card p-3 p-lg-4">
            <!-- Header: avatar + fő adatok -->
            <div class="d-flex flex-wrap align-items-center justify-content-between gap-3">
                <div class="d-flex align-items-center gap-3">
                    <img th:src="${user.profileImagePath != null ? user.profileImagePath : '/images/default-avatar.png'}"
                         alt="Profilkép"
                         class="avatar avatar--lg rounded-circle">

                    <div>
                        <div class="badge-soft mb-2">Felhasználó</div>
                        <div class="h4 fw-bold mb-1" th:text="${user.username}">username</div>
                        <div class="text-muted" th:text="${user.email}">email</div>
                    </div>
                </div>

                <div class="d-flex gap-2 flex-wrap">
                    <a class="btn btn-primary" th:href="@{/profile/edit}">Profil szerkesztése</a>
                </div>
            </div>

            <hr style="border-color: rgba(255,255,255,.12);" class="my-4">

            <!-- Részletek -->
            <div class="row g-3">
                <div class="col-md-6">
                    <div class="app-panel p-3 h-100">
                        <div class="text-muted small">Név</div>
                        <div class="fw-semibold">
                            <span th:text="${user.lastName}">Vezetéknév</span>
                            <span th:text="${user.firstName}">Keresztnév</span>
                        </div>
                    </div>
                </div>

                <div class="col-md-6">
                    <div class="app-panel p-3 h-100">
                        <div class="text-muted small">Születési dátum</div>
                        <div class="fw-semibold" th:text="${user.birthDate}">2000-01-01</div>
                    </div>
                </div>

                <div class="col-12">
                    <div class="app-panel p-3">
                        <div class="text-muted small">Hobbi</div>
                        <div class="fw-semibold" th:text="${user.hobby}">hobbi</div>
                    </div>
                </div>
            </div>

        </div>

    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
