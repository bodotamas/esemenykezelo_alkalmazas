<nav class="navbar navbar-expand-lg navbar-dark app-navbar sticky-top" th:fragment="navbar"
     xmlns:th="http://www.thymeleaf.org"
     xmlns:sec="https://www.thymeleaf.org/extras/spring-security">

    <div class="container py-2">

        <a class="navbar-brand d-flex align-items-center gap-2" th:href="@{/}">
            <span class="chip">
                <span style="width:10px;height:10px;border-radius:50%;background:linear-gradient(135deg,#7c3aed,#22c55e);display:inline-block;"></span>
                Eseménykezelő
            </span>
        </a>

        <button class="navbar-toggler" type="button"
                data-bs-toggle="collapse"
                data-bs-target="#nav"
                aria-controls="nav"
                aria-expanded="false"
                aria-label="Menü">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="nav">

            <!-- Bal oldali menü -->
            <ul class="navbar-nav me-auto gap-lg-1 mt-3 mt-lg-0">
                <li class="nav-item">
                    <a class="nav-link" data-match="/" th:href="@{/}">Főoldal</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" data-match="/events" th:href="@{/events}">Események</a>
                </li>

                <li class="nav-item" sec:authorize="hasAnyRole('SZERVEZO','ADMIN')">
                    <a class="nav-link" data-match="/events/new" th:href="@{/events/new}">
                        Új esemény
                    </a>
                </li>
            </ul>

            <!-- Jobb oldali menü -->
            <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-2">

                <!-- Ha NINCS belépve -->
                <li class="nav-item" sec:authorize="isAnonymous()">
                    <a class="nav-link" data-match="/login" th:href="@{/login}">
                        Bejelentkezés
                    </a>
                </li>

                <li class="nav-item" sec:authorize="isAnonymous()">
                    <a class="btn btn-primary" th:href="@{/register}">
                        Regisztráció
                    </a>
                </li>

                <!-- Ha BE VAN lépve -->
                <li class="nav-item" sec:authorize="isAuthenticated()">
                    <a class="nav-link d-flex align-items-center gap-2 chip" data-match="/profile" th:href="@{/profile}">
                        <img th:if="${currentUser != null}"
                             th:src="${currentUser.profileImagePath != null ? currentUser.profileImagePath : '/images/default-avatar.png'}"
                             alt="avatar"
                             class="avatar avatar--sm rounded-circle">
                        <span>Profil</span>
                    </a>
                </li>

                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" data-match="/admin" th:href="@{/admin/users}">Admin</a>
                </li>

                <li class="nav-item" sec:authorize="isAuthenticated()">
                    <form th:action="@{/logout}" method="post" class="d-inline m-0">
                        <input type="hidden"
                               th:name="${_csrf.parameterName}"
                               th:value="${_csrf.token}">
                        <button class="btn btn-outline-light" type="submit">
                            Kijelentkezés
                        </button>
                    </form>
                </li>

            </ul>
        </div>
    </div>
</nav>
